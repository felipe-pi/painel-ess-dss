<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Painel Altas Horas</title>

    <link rel="stylesheet" href="./assents/css/style.css?v=20260623-altas1" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <div class="mobile-header">
      <button id="menuToggle" class="menu-btn">&#9776;</button>

      <div class="logo">
        <img src="assents/img/logo.png" alt="ESS" />
      </div>
    </div>

    <aside class="sidebar" id="sidebar">
      <nav>
        <a href="index.html" class="menu-item">
          <i class="fa-solid fa-chart-column"></i>
          Dashboard
        </a>

        <a href="dss.html" class="menu-item">
          <i class="fa-solid fa-comments"></i>
          DSS
        </a>

        <a href="altas_horas.html" class="menu-item active">
          <i class="fa-solid fa-clock"></i>
          Altas Horas
        </a>

        <a href="#" class="menu-item">
          <i class="fa-solid fa-ranking-star"></i>
          Ranking
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="container">
        <h1>&#9200; Painel Altas Horas</h1>

        <p class="atualizado">
          Atualizado em:
          <span id="atualizadoAltasHoras"></span>
        </p>

        <div class="filtros">
          <input
            type="text"
            id="buscaAltasHoras"
            placeholder="Digite matricula ou nome"
          />

          <select id="areaFiltroAltasHoras">
            <option value="">Todas as areas</option>
          </select>

          <div class="filtros-data">
            <input type="date" id="dataInicioAltasHoras" />
            <input type="date" id="dataFimAltasHoras" />
            <button id="btnAplicarAltasHoras">Atualizar</button>
            <button id="btnLimparAltasHoras" type="button">Limpar</button>
          </div>
        </div>

        <div class="cards">
          <div class="card">
            <h3>Colaboradores</h3>
            <p id="colaboradoresAltasHoras">0</p>
          </div>

          <div class="card">
            <h3>Meta Altas Horas</h3>
            <p id="metaAltasHoras">0</p>
          </div>

          <div class="card">
            <h3>Realizado</h3>
            <p id="realizadoAltasHoras">0</p>
          </div>

          <div class="card">
            <h3>Performance</h3>
            <p id="performanceAltasHoras">0%</p>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Matricula</th>
              <th>Inspetor</th>
              <th>Area</th>
              <th>Meta</th>
              <th>Realizado</th>
              <th>Performance</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="tabelaAltasHoras"></tbody>
        </table>
      </div>
    </main>

    <script src="./assents/js/altas_horas.js?v=20260623-altas1"></script>
  </body>
</html>
