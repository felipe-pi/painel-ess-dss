<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Painel DSS</title>

    <link rel="stylesheet" href="assents/css/style.css?v=20260623-altas1" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <div class="mobile-header">
      <button id="menuToggle" class="menu-btn">&#9776;</button>

      <div class="logo">
        <img src="assents/img/logo.png" alt="ESS" />
      </div>
    </div>

    <aside class="sidebar" id="sidebar">
      <nav>
        <a href="index.html" class="menu-item">
          <i class="fa-solid fa-chart-column"></i>
          Dashboard
        </a>

        <a href="dss.html" class="menu-item active">
          <i class="fa-solid fa-comments"></i>
          DSS
        </a>

        <a href="altas_horas.html" class="menu-item">
          <i class="fa-solid fa-clock"></i>
          Altas Horas
        </a>

        <a href="#" class="menu-item">
          <i class="fa-solid fa-ranking-star"></i>
          Ranking
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="container">
        <h1>&#128172; Painel DSS</h1>

        <p class="atualizado">
          Atualizado em:
          <span id="atualizadoDss"></span>
        </p>

        <div class="filtros">
          <input
            type="text"
            id="buscaDss"
            placeholder="Digite nome, matricula ou area"
          />

          <select id="areaFiltroDss">
            <option value="">Todas as areas</option>
          </select>

          <div class="filtros-data">
            <input type="date" id="dataInicioDss" />
            <input type="date" id="dataFimDss" />
            <button id="btnAplicarDss">Atualizar</button>
            <button id="btnLimparDss" type="button">Limpar</button>
          </div>
        </div>

        <div class="cards cards-5">
          <div class="card">
            <h3>Areas</h3>
            <p id="areasDss">0</p>
          </div>

          <div class="card">
            <h3>Meta DSS</h3>
            <p id="metaDss">0</p>
          </div>

          <div class="card">
            <h3>Realizado</h3>
            <p id="realizadoDss">0</p>
          </div>

          <div class="card">
            <h3>Performance</h3>
            <p id="performanceDss">0%</p>
          </div>

          <div class="card">
            <h3>Participantes</h3>
            <p id="participantesDss">0</p>
          </div>
        </div>

        <h2 class="titulo-secao">Resumo por Area</h2>

        <table>
          <thead>
            <tr>
              <th>Area</th>
              <th>Qtd.</th>
              <th>Meta</th>
              <th>Realizado</th>
              <th>Gap</th>
              <th>Performance</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="tabelaAreasDss"></tbody>
        </table>

        <h2 class="titulo-secao">Resumo por Colaborador</h2>

        <table>
          <thead>
            <tr>
              <th>Matricula</th>
              <th>Colaborador</th>
              <th>Area</th>
              <th>DSS Realizados</th>
              <th>Participantes</th>
            </tr>
          </thead>

          <tbody id="tabelaColaboradoresDss"></tbody>
        </table>
      </div>
    </main>

    <script src="assents/js/dss.js?v=20260623-altas1"></script>
  </body>
</html>
